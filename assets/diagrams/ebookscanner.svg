  <rect x="648" y="330" width="84" height="124" rx="5" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="690" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">MOBI/AZW</text>
  <line x1="648" y1="352" x2="732" y2="352" stroke="#E2E8F0" stroke-width="1"/>
  <text x="690" y="368" text-anchor="middle" font-size="10" fill="#475569">MobiMetadata</text>
  <text x="690" y="381" text-anchor="middle" font-size="10" fill="#475569">Extractor</text>
  <text x="690" y="400" text-anchor="middle" font-size="10" fill="#94A3B8">Custom Palm</text>
  <text x="690" y="413" text-anchor="middle" font-size="10" fill="#94A3B8">DB Parser</text>
  <text x="690" y="429" text-anchor="middle" font-size="10" fill="#94A3B8">EXTH records</text>
  <text x="690" y="443" text-anchor="middle" font-size="10" fill="#94A3B8">(no package)</text>

