  <rect x="738" y="330" width="84" height="124" rx="5" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="780" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">CHM</text>
