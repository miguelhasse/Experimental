  <!-- scan command box -->
  <rect x="50" y="120" width="157" height="153" rx="6" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="128" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#065F46">scan (root command)</text>
  <line x1="50" y1="144" x2="207" y2="144" stroke="#D1FAE5" stroke-width="1"/>
  <text x="60" y="161" font-size="11" fill="#374151">• &lt;directory&gt; arg</text>
  <text x="60" y="177" font-size="11" fill="#374151">• --recursive / -r</text>
  <text x="60" y="193" font-size="11" fill="#374151">• --format md|json</text>
  <text x="60" y="209" font-size="11" fill="#374151">• --output &lt;file&gt;</text>
  <text x="60" y="225" font-size="11" fill="#374151">• --include formats</text>
  <text x="60" y="246" font-size="11" fill="#94A3B8">System.CommandLine 2.0.5</text>

  <!-- mcp command box -->
  <rect x="218" y="120" width="165" height="153" rx="6" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="300" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#065F46">mcp (sub-command)</text>
  <line x1="218" y1="144" x2="383" y2="144" stroke="#D1FAE5" stroke-width="1"/>
  <text x="228" y="162" font-size="11" fill="#374151">Tools:</text>
  <text x="228" y="178" font-size="11" fill="#374151">• scan_directory</text>
  <text x="228" y="194" font-size="11" fill="#374151">• extract_metadata</text>
  <text x="228" y="213" font-size="11" fill="#374151">Transports:</text>
  <text x="228" y="229" font-size="11" fill="#374151">• stdio (default)</text>
  <text x="228" y="245" font-size="11" fill="#374151">• HTTP / SSE</text>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- EbookScanner.Tests  (left bottom)                                       -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <rect x="32" y="314" width="370" height="172" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <rect x="32" y="314" width="370" height="38" rx="10" fill="#F59E0B"/>
  <rect x="32" y="334"  width="370" height="18" fill="#F59E0B"/>
  <text x="217" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="white"
        letter-spacing="0.3">EbookScanner.Tests  (xUnit.v3 · 60 tests)</text>

