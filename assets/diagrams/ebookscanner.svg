  <text x="643" y="157" text-anchor="middle" font-size="11" fill="#64748B">ScanAsync(ScanOptions)  ·  ExtractAsync(filePath)</text>

  <!-- Models box -->
  <rect x="458" y="180" width="172" height="108" rx="6" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="544" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">Models</text>
  <text x="470" y="215" font-size="11" fill="#475569">• BookMetadata</text>
  <text x="470" y="231" font-size="11" fill="#475569">• ScanOptions</text>
  <text x="470" y="247" font-size="11" fill="#475569">• ScanResult</text>
  <text x="470" y="263" font-size="11" fill="#94A3B8">• BookFormat (enum)</text>

  <!-- Formatters box -->
  <rect x="638" y="180" width="190" height="108" rx="6" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="733" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">Formatters</text>
  <text x="650" y="215" font-size="11" fill="#475569">• IMetadataFormatter</text>
  <text x="650" y="231" font-size="11" fill="#475569">• MarkdownFormatter</text>
  <text x="650" y="247" font-size="11" fill="#475569">• MarkdownTableFormatter</text>
  <text x="650" y="263" font-size="11" fill="#475569">• JsonFormatter</text>

