  <rect x="458" y="302" width="370" height="166" rx="6" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="643" y="321" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">Extractors</text>

  <!-- PDF card (84 px wide) -->
  <rect x="468" y="330" width="84" height="124" rx="5" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="510" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">PDF</text>
  <line x1="468" y1="352" x2="552" y2="352" stroke="#E2E8F0" stroke-width="1"/>
  <text x="510" y="368" text-anchor="middle" font-size="10" fill="#475569">PdfMetadata</text>
  <text x="510" y="381" text-anchor="middle" font-size="10" fill="#475569">Extractor</text>
  <text x="510" y="400" text-anchor="middle" font-size="10" fill="#94A3B8">UglyToad</text>
  <text x="510" y="413" text-anchor="middle" font-size="10" fill="#94A3B8">.PdfPig</text>
  <text x="510" y="429" text-anchor="middle" font-size="9"  fill="#94A3B8">1.7.0-custom-5</text>
  <text x="510" y="443" text-anchor="middle" font-size="10" fill="#94A3B8">↑ package</text>

