  <rect x="50" y="366" width="157" height="100" rx="6" fill="white" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="128" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Formatters</text>
  <line x1="50" y1="389" x2="207" y2="389" stroke="#FEF3C7" stroke-width="1"/>
  <text x="60" y="406" font-size="11" fill="#374151">• MarkdownFormatterTests</text>
  <text x="60" y="422" font-size="11" fill="#374151">• MarkdownTableFormatter</text>
  <text x="60" y="438" font-size="11" fill="#374151">• JsonFormatterTests</text>
  <text x="128" y="456" text-anchor="middle" font-size="11" fill="#92400E" font-weight="500">21 tests</text>

  <!-- Core tests -->
  <rect x="218" y="366" width="165" height="100" rx="6" fill="white" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="300" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Extractors / Service</text>
  <line x1="218" y1="389" x2="383" y2="389" stroke="#FEF3C7" stroke-width="1"/>
  <text x="228" y="406" font-size="11" fill="#374151">• MobiMetadataExtractor</text>
  <text x="228" y="422" font-size="11" fill="#374151">• ChmMetadataExtractor</text>
  <text x="228" y="438" font-size="11" fill="#374151">• EbookScannerService</text>
  <text x="300" y="456" text-anchor="middle" font-size="11" fill="#92400E" font-weight="500">39 tests</text>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- Dependency arrows                                                        -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Cli → Core (at Cli vertical midpoint y≈181) -->
  <line x1="403" y1="181" x2="435" y2="181"
        stroke="#64748B" stroke-width="2" stroke-dasharray="5,3"
        marker-end="url(#arr)"/>
  <text x="419" y="172" text-anchor="middle" font-size="10" fill="#64748B">depends on</text>

  <!-- Tests → Core (at Tests vertical midpoint y≈400) -->
  <line x1="403" y1="400" x2="435" y2="400"
        stroke="#64748B" stroke-width="2" stroke-dasharray="5,3"
        marker-end="url(#arr)"/>
  <text x="419" y="391" text-anchor="middle" font-size="10" fill="#64748B">depends on</text>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- Bottom: output formats strip                                             -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <rect x="32" y="508" width="816" height="58" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="440" y="527" text-anchor="middle" font-size="11" font-weight="700" fill="#475569"
        letter-spacing="0.5">OUTPUT FORMATS</text>
  <text x="190" y="549" text-anchor="middle" font-size="12" fill="#374151">📄 Markdown catalog</text>
  <text x="440" y="549" text-anchor="middle" font-size="12" fill="#374151">{ } JSON catalog</text>
  <text x="690" y="549" text-anchor="middle" font-size="12" fill="#374151">🤖 MCP tool responses</text>

</svg>
