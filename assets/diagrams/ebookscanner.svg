  <rect x="558" y="330" width="84" height="124" rx="5" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="600" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">EPUB</text>
  <line x1="558" y1="352" x2="642" y2="352" stroke="#E2E8F0" stroke-width="1"/>
  <text x="600" y="368" text-anchor="middle" font-size="10" fill="#475569">EpubMetadata</text>
  <text x="600" y="381" text-anchor="middle" font-size="10" fill="#475569">Extractor</text>
  <text x="600" y="400" text-anchor="middle" font-size="10" fill="#94A3B8">VersOne</text>
  <text x="600" y="413" text-anchor="middle" font-size="10" fill="#94A3B8">.Epub</text>
  <text x="600" y="429" text-anchor="middle" font-size="10" fill="#94A3B8">3.3.6</text>
  <text x="600" y="443" text-anchor="middle" font-size="10" fill="#94A3B8">↑ package</text>

