  <text x="780" y="368" text-anchor="middle" font-size="10" fill="#475569">ChmMetadata</text>
  <text x="780" y="381" text-anchor="middle" font-size="10" fill="#475569">Extractor</text>
  <text x="780" y="400" text-anchor="middle" font-size="10" fill="#94A3B8">Custom ITSF</text>
  <text x="780" y="413" text-anchor="middle" font-size="10" fill="#94A3B8">Binary Parser</text>
  <text x="780" y="429" text-anchor="middle" font-size="10" fill="#94A3B8">PMGL+#SYSTEM</text>
  <text x="780" y="443" text-anchor="middle" font-size="10" fill="#94A3B8">(no package)</text>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- EbookScanner.Cli  (left top)                                            -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <rect x="32" y="68" width="370" height="225" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <rect x="32" y="68" width="370" height="38" rx="10" fill="#10B981"/>
  <rect x="32" y="88"  width="370" height="18" fill="#10B981"/>
  <text x="217" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="white"
