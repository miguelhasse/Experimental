  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- EbookScanner.Core  (right, full-height)                                 -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <rect x="438" y="68" width="410" height="418" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <!-- header pill -->
  <rect x="438" y="68" width="410" height="38" rx="10" fill="#3B82F6"/>
  <rect x="438" y="88"  width="410" height="18" fill="#3B82F6"/>
  <text x="643" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="white"
        letter-spacing="0.3">EbookScanner.Core</text>

  <!-- EbookScannerService -->
  <rect x="458" y="120" width="370" height="46" rx="6" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
