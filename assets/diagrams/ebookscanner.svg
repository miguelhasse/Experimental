<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 590" width="880" height="590"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- ── Background ───────────────────────────────────────────────────────── -->
  <rect width="880" height="590" fill="#F8FAFC" rx="14"/>

  <!-- ── Title ─────────────────────────────────────────────────────────────── -->
  <text x="440" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A"
